<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="authors" content="Yana Podskrebysheva & Egor Slyuta">
        <link rel="stylesheet" href="CSS\main.css">
        <title>CodeBlock Pro</title>
    </head>
    <body>
        <div id="header">
            <button class="button" id="run-button" onclick="main()">Run Program</button>
            <button class="button" id="del-button" onclick="deleteAllBlocks()">Delete all</button>
            <span id="header_text">CodeBlock Pro</span>
        </div>
        <div id="aside"></div>
        <div id="aside_block"><span id="aside_text">Blocks</span></div>

        <img class="blocks" id="default_code_block" src="pictures/default_code_block.svg" alt="def_cb">
        <br>
        <img class="blocks" id="cy-co_code_block" src="pictures/cycle&condition_code_block.svg" alt="cy&co_cb"><br>
        <img class="blocks" id="the-end_code_block" src="pictures/the-end_code_block.svg" alt="t-e_cb">

        <div id="console-wrapper">
            <div id="console-tab" onclick="toggleConsole()">
                <div id="console-chevron"></div>
            </div>
            <div id="console-body"></div>
        </div>

        <script src="JS/interpretator.js"></script>
        <script src="JS/script.js"></script>
    </body>
</html>
